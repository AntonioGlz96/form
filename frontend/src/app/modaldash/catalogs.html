<div class="container">

  <h5 class="mb-4 fw-bold">
    Modelo: {{ model?.title }}
  </h5>

  <!-- COLORES -->
  <div class="mb-3">
    <label class="fw-bold">Colores</label>

    <div *ngFor="let c of colors" class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        [checked]="existeRelacion(model.id, c.id)"
        [disabled]="existeRelacion(model.id, c.id)"
        (change)="toggleCategory(c.id)"
      />
      <label class="form-check-label">
        {{ c.title }}
      </label>
    </div>
  </div>

  <!-- TALLAS -->
  <div class="mb-3">
    <label class="fw-bold">Tallas</label>

    <div *ngFor="let s of sizes" class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        [checked]="existeRelacion(model.id, s.id)"
        [disabled]="existeRelacion(model.id, s.id)"
        (change)="toggleCategory(s.id)"
      />
      <label class="form-check-label">
        {{ s.title }}
      </label>
    </div>
  </div>

  <div class="d-flex justify-content-end">
    <button class="btn btn-success" (click)="submit()">
      Guardar relaciones
    </button>
  </div>

</div>
