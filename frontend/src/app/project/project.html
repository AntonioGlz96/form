<div class="row">

  <!-- PANTALÓN -->
  <div class="col-md-6 mb-3">
    <label>Pantalón</label>
    <input type="checkbox" [(ngModel)]="project.check_pants" name="check_pants"/>

    <ng-select
      [items]="catalogs.models.data"
      bindLabel="title"
      bindValue="id"
      [(ngModel)]="projectModels.pants"
      name="models_pants"
      [multiple]="true"
      [disabled]="!project.check_pants">
    </ng-select>
  </div>

  <!-- CAMISOLA -->
