<hr class="my-4" />

<div class="row">
  <div class="col-12 mb-2">
    <label class="form-label fw-semibold">Modelos por prenda</label>
  </div>

  <!-- PANTALÓN -->
  <div class="col-md-6 mb-3">
    <label>Pantalón</label>

    <!-- YA EXISTÍA -->
    <input type="checkbox" [(ngModel)]="project.check_pants" name="check_pants" />

    <!-- selector de modelos -->
    <ng-select
      [items]="catalogs.models.data"
      bindLabel="title"
      bindValue="id"
      [(ngModel)]="projectModels.pants"
      name="models_pants"
      [multiple]="true"
      [disabled]="!project.check_pants">
    </ng-select>
  </div>

  <!-- CAMISA -->
  <div class="col-md-6 mb-3">
    <label>Camisa</label>

    <input type="checkbox" [(ngModel)]="project.check_shirt" name="check_shirt" />

    <ng-select
      [items]="catalogs.models.data"
      bindLabel="title"
      bindValue="id"
      [(ngModel)]="projectModels.shirt"
      name="models_shirt"
      [multiple]="true"
      [disabled]="!project.check_shirt">
    </ng-select>
  </div>

</div>
